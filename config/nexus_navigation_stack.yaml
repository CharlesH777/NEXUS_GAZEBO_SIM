/elevation_mapping_node:
  ros__parameters:
    use_sim_time: true

    drift_compensation_variance_inlier: 0.1
    checker_layer: "elevation"
    initialized_variance: 10.0
    resolution: 0.1
    map_length: 20.0
    sensor_noise_factor: 0.05
    mahalanobis_thresh: 2.0
    outlier_variance: 0.01
    max_drift: 0.1
    drift_compensation_alpha: 0.1
    time_variance: 0.0001
    max_variance: 100.0
    initial_variance: 1000.0
    traversability_inlier: 0.9
    dilation_size: 3
    wall_num_thresh: 20
    min_height_drift_cnt: 100
    position_noise_thresh: 0.01
    orientation_noise_thresh: 0.01
    position_lowpass_alpha: 0.2
    orientation_lowpass_alpha: 0.2
    min_valid_distance: 0.1
    max_height_range: 10.5
    ramped_height_range_a: 0.3
    ramped_height_range_b: 1.0
    ramped_height_range_c: 0.2
    update_variance_fps: 5.0
    update_pose_fps: 10.0
    time_interval: 0.1
    map_acquire_fps: 5.0
    publish_statistics_fps: 1.0
    recordable_fps: 3.0
    enable_normal_arrow_publishing: false
    cupy_memory_pool_trim_interval_s: 5.0

    masked_replace_service_mask_layer_name: "mask"
    save_map_default_topic: "elevation_map"
    save_map_storage_id: "mcap"
    service_namespace: "/elevation_mapping_cupy"

    max_ray_length: 10.0
    cleanup_step: 0.1
    cleanup_cos_thresh: 0.1

    safe_thresh: 0.7
    safe_min_thresh: 0.4
    max_unsafe_n: 10

    overlap_clear_range_xy: 4.0
    overlap_clear_range_z: 2.0

    map_frame: "world"
    base_frame: "base_link"
    corrected_map_frame: "world"

    enable_edge_sharpen: true
    enable_visibility_cleanup: true
    enable_drift_compensation: true
    enable_overlap_clearance: true
    enable_pointcloud_publishing: false
    enable_drift_corrected_TF_publishing: false

    use_chainer: false
    use_only_above_for_upper_bound: false

    initialize_method: "linear"
    initialize_frame_id: ["base_link"]
    initialize_tf_offset: [0.0]
    dilation_size_initialize: 2
    initialize_tf_grid_size: 1.0
    use_initializer_at_start: true

    subscribers:
      lidar:
        topic_name: "/livox/lidar_PointCloud2"
        data_type: "pointcloud"

    publishers:
      elevation_map:
        layers: ["elevation", "variance", "traversability"]
        basic_layers: ["elevation"]
        fps: 5.0

/elevation_map_exporter:
  ros__parameters:
    use_sim_time: true
    grid_map_topic: "/elevation_mapping_node/elevation_map"
    output_dir: ""
    elevation_layer: "elevation"
    save_interval_sec: 0.0
    save_preview: true

/traversability_to_map:
  ros__parameters:
    use_sim_time: true
    grid_map_topic: "/elevation_mapping_node/elevation_map"
    map_topic: "/traversability_map"
    layer: "elevation"
    frame_id: ""
    fallback_frame_id: "world"
    unknown_value: -1
    kernel_size: 3
    clear_below_m: 0.04
    accumulate_from_m: 0.05
    full_at_m: 0.10
    median_filter_size: 3

/mppi_navigator:
  ros__parameters:
    use_sim_time: true
    grid_map_topic: "/elevation_mapping_node/elevation_map"
    traversability_map_topic: "/traversability_map"
    odom_topic: "/nav_odom"
    world_pose_topic: "/cube_robot/world_pose"
    goal_topic: "/goal_pose"
    reference_path_topic: "/mppi/reference_path"
    reference_path_debug_topic: "/mppi/reference_path_debug"
    cmd_topic: "/mppi/cmd_vel_raw"
    optimal_path_topic: "/mppi/optimal_path"
    terrain_cost_topic: "/mppi/terrain_cost_map"
    control_rate: 20.0
    batch_size: 1000
    time_steps: 56
    model_dt: 0.05
    iteration_count: 1
    temperature: 0.50
    gamma: 0.015
    seed: 7
    command_sequence_offset: 1
    use_savgol_filter: true
    min_vx_velocity_threshold: 0.02
    min_vy_velocity_threshold: 0.02
    min_wz_velocity_threshold: 0.04
    vx_max: 1.50
    vx_min: -0.30
    vy_max: 0.60
    wz_max: 1.40
    ax_max: 3.0
    ay_max: 2.0
    awz_max: 3.0
    vx_std: 0.50
    vy_std: 0.35
    wz_std: 0.55
    goal_distance_weight: 3.0
    goal_progress_weight: 20.0
    goal_heading_weight: 1.5
    goal_heading_activation_distance: 0.25
    path_distance_weight: 0.8
    path_follow_offset: 6
    path_follow_threshold_to_goal: 0.35
    control_effort_weight: 0.001
    control_smoothness_weight: 0.010
    twirling_weight: 0.005
    prefer_forward_weight: 0.15
    traversability_cost_weight: 2.0
    variance_cost_weight: 0.3
    variance_full_scale: 0.05
    slope_cost_weight: 5.0
    slope_start_deg: 25.0
    slope_max_deg: 50.0
    collision_cost: 5000.0
    fail_on_all_collision: false
    unknown_is_obstacle: false
    unknown_cost_weight: 0.20
    traversability_stop_threshold: 0.02
    footprint_radius: 0.18
    footprint_sample_count: 8
    goal_tolerance_xy: 0.2
    goal_tolerance_yaw: 0.35
    odom_timeout_sec: 0.5
    pose_timeout_sec: 0.5
    world_pose_hold_sec: 2.0
    map_timeout_sec: 1.0
    use_open_loop: true
    allow_goal_without_map: false
    publish_debug_path: true

/sand_mpc_compensator:
  ros__parameters:
    use_sim_time: true
    input_cmd_topic: "/mppi/cmd_vel_raw"
    output_cmd_topic: "/cmd_vel"
    odom_topic: "/nav_odom"
    control_rate: 20.0
    command_timeout_sec: 0.30
    odom_timeout_sec: 0.6
    translational_deadband: 0.02
    preserve_lateral_direction: true
    passthrough_on_missing_odom: true
    publish_zero_on_timeout: true

    horizon: 10
    dt_nominal: 0.05
    cmd_delay: 0.05
    drive_tau: 0.08
    turn_tau: 0.08
    q_v: 80.0
    q_int_v: 8.0
    r_du_v: 0.50
    q_w: 60.0
    q_int_w: 4.0
    r_du_w: 0.80
    slip_alpha: 0.15
    slip_init: 0.10
    correction_gain: 0.25
    v_max: 1.50
    w_max: 1.40

/novelty_explorer:
  ros__parameters:
    use_sim_time: true
    traversability_map_topic: "/traversability_map"
    odom_topic: "/nav_odom"
    world_pose_topic: "/cube_robot/world_pose"
    goal_topic: "/goal_pose"
    reference_path_topic: "/mppi/reference_path"
    radar_known_debug_topic: "/novelty_explorer/radar_known"
    novelty_debug_topic: "/novelty_explorer/novelty_map"
    planning_rate: 2.0
    pose_timeout_sec: 1.0
    map_timeout_sec: 2.0
    goal_republish_sec: 1.0
    occupancy_obstacle_threshold: 75
    radar_range: 5.0
    radar_rays: 180
    vision_range: 1.0
    vision_fov: 270.0
    vision_rays: 45
    novelty_decay: 0.5
    novelty_observed_threshold: 0.5
    candidate_min_dist: 0.3
    frontier_count: 30
    frontier_max_dist: 10.0
    d_step: 1.0
    d_min: 0.4
    d_max: 1.5
    safe_radius: 0.08
    trav_threshold: 0.22
    arrived_threshold: 0.2
    stuck_steps: 3
    stuck_disp_threshold: 0.05
    enable_unknown_fallback: true
    enable_last_resort_no_los: true
