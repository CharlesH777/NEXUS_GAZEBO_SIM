/mppi_navigator:
  ros__parameters:
    grid_map_topic: /elevation_mapping_node/elevation_map
    traversability_map_topic: /traversability_map
    odom_topic: /nav_odom
    world_pose_topic: /cube_robot/world_pose
    goal_topic: /goal_pose
    reference_path_topic: /mppi/reference_path
    reference_path_debug_topic: /mppi/reference_path_debug
    cmd_topic: /mppi/cmd_vel_raw
    optimal_path_topic: /mppi/optimal_path
    terrain_cost_topic: /mppi/terrain_cost_map
    control_rate: 20.0
    batch_size: 1000
    time_steps: 56
    model_dt: 0.05
    iteration_count: 1
    temperature: 0.30
    gamma: 0.015
    seed: 7
    command_sequence_offset: 1
    use_savgol_filter: true
    min_vx_velocity_threshold: 0.02
    min_vy_velocity_threshold: 0.02
    min_wz_velocity_threshold: 0.04
    vx_max: 1.50
    vx_min: 0.00
    vy_max: 0.60
    wz_max: 1.40
    ax_max: 1.80
    ay_max: 1.80
    awz_max: 2.50
    vx_std: 0.20
    vy_std: 0.20
    wz_std: 0.40
    goal_distance_weight: 10.0
    goal_progress_weight: 8.0
    goal_heading_weight: 1.5
    goal_heading_activation_distance: 0.25
    path_distance_weight: 1.5
    path_follow_offset: 6
    path_follow_threshold_to_goal: 1.4
    control_effort_weight: 0.005
    control_smoothness_weight: 0.02
    twirling_weight: 0.005
    prefer_forward_weight: 0.25
    traversability_cost_weight: 3.0
    variance_cost_weight: 0.5
    variance_full_scale: 0.05
    slope_cost_weight: 6.0
    slope_start_deg: 25.0
    slope_max_deg: 45.0
    collision_cost: 5000.0
    fail_on_all_collision: false
    unknown_is_obstacle: false
    unknown_cost_weight: 0.35
    traversability_stop_threshold: 0.03
    footprint_radius: 0.20
    footprint_sample_count: 8
    goal_tolerance_xy: 0.35
    goal_tolerance_yaw: 0.35
    odom_timeout_sec: 0.5
    pose_timeout_sec: 0.5
    world_pose_hold_sec: 2.0
    map_timeout_sec: 1.0
    use_open_loop: true
    allow_goal_without_map: false
    publish_debug_path: true
